<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/radar/">
  <title>Radar de Preços — As Melhores Ofertas do Mercado Livre Hoje</title>
  <meta name="description" content="Economize com as melhores ofertas curadas do Mercado Livre. Monitoramos preços em tempo real para você encontrar o maior desconto.">
  <link rel="canonical" href="https://radardeprecos.github.io/radar/">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    h1 {
      color: #333;
      margin: 0 0 10px 0;
    }
    p {
      color: #666;
      margin: 10px 0;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }
    a:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Radar de Preços</h1>
    <p>Redirecionando para as melhores ofertas...</p>
    <p style="font-size: 14px; color: #999;">Se não for redirecionado automaticamente em alguns segundos:</p>
    <a href="/radar/">Clique aqui para acessar o Radar de Preços</a>
  </div>

  <script>
    // Redirecionamento via JavaScript como fallback
    window.location.href = '/radar/';
  </script>
</body>
</html>
